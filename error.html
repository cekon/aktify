<!doctype html>
<html lang="ru">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>Ошибка при оплате — Aktify.ru</title>
 <link rel="preconnect" href="https://googleapis.com">
 <link rel="preconnect" href="https://gstatic.com" crossorigin>
 <link href="https://googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
 <div class="grain"></div>
 <main style="min-height: 100vh; display: grid; place-items: center; padding: 20px;">
   <div class="hero-card" style="max-width: 540px; min-height: auto; padding: 48px; text-align: center; gap: 20px;">
     <div style="font-size: 64px; margin-bottom: 10px;">🛑</div>
     <span class="eyebrow" style="color: #c91717; letter-spacing: 0.1em;">Оплата не прошла</span>
     <h1 style="font-size: 32px; margin: 10px 0;">Не удалось провести платеж</h1>
     <p style="font-size: 16px; color: var(--muted); line-height: 1.6;">
       Операция была прервана банком или отменена. Деньги с вашей карты не списались.
     </p>
     <div style="background: rgba(23,17,10,0.03); padding: 18px; border-radius: 18px; border: 1px solid var(--line); text-align: left; font-size: 14px; color: var(--muted); line-height: 1.5; margin: 10px 0;">
       <strong>Возможные причины:</strong><br>
       • Недостаточно средств на балансе карты.<br>
       • Превышен лимит на интернет-покупки.<br>
       • Ошибка при вводе 3D-Secure кода из СМС.
     </div>
     <div class="hero-actions" style="justify-content: center; margin-top: 10px;">
       <a class="btn primary" href="index.html">Вернуться на главную</a>
       
     </div>
   </div>
 </main>

</html>
